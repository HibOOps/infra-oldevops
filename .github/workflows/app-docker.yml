name: Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'app-demo/**'
      - '.github/workflows/app-docker.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      backend_image: ${{ steps.meta.outputs.backend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Git SHA short and image names
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "frontend_image=ghcr.io/${OWNER}/app-demo-frontend" >> $GITHUB_OUTPUT
          echo "backend_image=ghcr.io/${OWNER}/app-demo-backend" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: app-demo/frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.frontend_image }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: app-demo/backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.backend_image }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Frontend image
        run: docker pull ${{ needs.build-and-push.outputs.frontend_image }}:${{ github.sha }}

      - name: Pull Backend image
        run: docker pull ${{ needs.build-and-push.outputs.backend_image }}:${{ github.sha }}

      - name: Trivy scan - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.frontend_image }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Trivy scan - Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.backend_image }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          skip-dirs: '/usr/local/lib/node_modules/npm'
