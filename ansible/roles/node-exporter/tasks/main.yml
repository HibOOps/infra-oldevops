---
- name: Create node-exporter directory
  file:
    path: /opt/node-exporter
    state: directory
    mode: '0755'

- name: Deploy node-exporter docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/node-exporter/docker-compose.yml
    mode: '0644'

- name: UFW - allow Docker bridge to reach node-exporter
  command: ufw allow from 172.16.0.0/12 to any port 9100 proto tcp
  register: ufw_docker_result
  changed_when: "'Skipping' not in ufw_docker_result.stdout"
  ignore_errors: true

- name: Remove stale cadvisor container if present
  shell: docker rm -f cadvisor 2>/dev/null || true

- name: Launch Node Exporter
  shell: docker compose up -d --remove-orphans
  args:
    chdir: /opt/node-exporter

- name: Wait for Node Exporter to be healthy
  uri:
    url: http://localhost:9100/metrics
    method: GET
    status_code: 200
  register: result
  until: result.status == 200
  retries: 10
  delay: 2

- name: Verify node-exporter is running
  debug:
    msg: "Node Exporter successfully deployed on {{ inventory_hostname }}"
